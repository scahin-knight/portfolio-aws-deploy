<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Sachin Portfolio</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/icons/favicon.ico" type="image/x-icon">
    
    <style>
        .error-section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }
        
        .error-text {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        
        .error-desc {
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 3rem;
        }
    </style>
</head>
<body class="dark-mode">

    <!-- Custom Cursor -->
    <div class="cursor-dot" id="cursor-dot"></div>
    <div class="cursor-outline" id="cursor-outline"></div>

    <section class="error-section">
        <!-- Background elements -->
        <div class="hero-bg-glow glow-1"></div>
        <div class="hero-bg-glow glow-2"></div>
        
        <div class="container fade-in">
            <div class="error-code gradient-text">404</div>
            <h1 class="error-text">Connection Lost in the Cloud</h1>
            <p class="error-desc">The node you are looking for has been terminated or does not exist in this cluster. Let's redirect you back to the master node.</p>
            
            <a href="index.html" class="btn btn-primary btn-glow">
                <i class="fas fa-home"></i> Return Home
            </a>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
